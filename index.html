<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#12101c" />
    <title>Block Shift</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #12101c;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        width: 100%;
        height: 100%;
        /* No flex centering here — Phaser's Scale.CENTER_BOTH positions the
           canvas. Double-centering can desync the input hit-area on some
           window sizes, making buttons look clickable but not respond. */
      }
      /* Keep the pixel art crisp when the canvas is scaled up. */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
