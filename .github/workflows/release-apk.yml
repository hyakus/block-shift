name: Build & Release Debug APK

# Builds the Android debug APK and publishes it as a GitHub Release asset.
#
# Runs automatically when you push a tag (e.g. `0.1.0.2`). To build a tag that
# was pushed *before* this workflow existed (like `0.1.0.1`), trigger it
# manually from the Actions tab ("Run workflow") and enter the tag name.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build & release (e.g. 0.1.0.1)"
        required: true

# Needed for softprops/action-gh-release to create/update the Release.
permissions:
  contents: write

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Checkout ${{ steps.tag.outputs.name }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up JDK 17 # Android Gradle Plugin 8.2.x requires Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle # tsc --noEmit && vite build -> dist/
        run: npm run build

      - name: Sync web assets into the Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK with a versioned name
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "out/block-shift-${{ steps.tag.outputs.name }}-debug.apk"

      - name: Upload APK as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: block-shift-${{ steps.tag.outputs.name }}-debug
          path: out/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: true
          fail_on_unmatched_files: true
          files: out/*.apk
          body: |
            Automated **debug** build of Block Shift `${{ steps.tag.outputs.name }}`.

            > ⚠️ This is an unsigned **debug** APK — for testing / sideloading only.
            > On your device, enable "Install unknown apps", then download and open
            > `block-shift-${{ steps.tag.outputs.name }}-debug.apk` below.
